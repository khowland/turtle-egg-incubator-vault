[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not e2e"
markers =
    e2e: Playwright end-to-end tests requiring a live running server on port 8501.
         Run separately with: pytest -m e2e (requires app running first)

pythonpath = .
