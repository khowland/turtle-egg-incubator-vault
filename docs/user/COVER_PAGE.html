<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINC Manual Cover</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f7f6;
            font-family: 'Outfit', sans-serif;
            color: #2c3e50;
        }

        .cover-container {
            width: 8.5in;
            height: 11in;
            background: white;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1in;
            box-sizing: border-box;
            border: 10px solid #27ae60;
            position: relative;
        }

        .header {
            text-align: center;
        }

        h1 {
            font-size: 42pt;
            margin: 0;
            color: #27ae60;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .subtitle {
            font-size: 18pt;
            margin-top: 10px;
            color: #7f8c8d;
            font-weight: 300;
        }

        .image-container {
            width: 100%;
            height: 5in;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 20px;
            border: 4px dashed #27ae60;
            padding: 10px;
        }

        .image-container img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 15px;
        }

        .footer {
            text-align: center;
            width: 100%;
            border-top: 2px solid #ecf0f1;
            padding-top: 30px;
        }

        .credits {
            font-size: 14pt;
            font-weight: 600;
            color: #2c3e50;
        }

        .metadata {
            font-size: 11pt;
            color: #95a5a6;
            margin-top: 10px;
            line-height: 1.6;
        }

        .winc-badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: #27ae60;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 800;
            font-size: 10pt;
        }

        @media print {
            body {
                background: none;
            }

            .cover-container {
                box-shadow: none;
                border: 10px solid #27ae60 !important;
            }
        }
    </style>
</head>

<body>

    <div class="cover-container">
        <div class="winc-badge">OFFICIAL CLINICAL REFERENCE</div>

        <div class="header">
            <h1>WINC</h1>
            <div class="subtitle">Turtle Egg Incubation and Hatching System</div>
        </div>

        <div class="image-container">
            <img src="../../assets/manual/cover.png" alt="WINC Turtle Cover Art">
        </div>

        <div class="footer">
            <div class="credits">Developed by Kevin Howland</div>
            <div class="metadata">
                Version 10.5.1 | Released: April 2026<br>
                Contact: it2howland@gmail.com<br>
                <i>Wildlife In Need Center - Clinical Operations</i>
            </div>
        </div>
    </div>

</body>

</html>
