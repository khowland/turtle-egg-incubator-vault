<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINC Manual Cover</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .cover-page {
            width: 8.5in;
            height: 11in;
            background-color: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            border-top: 25px solid #10b981; /* WINC GREEN */
            overflow: hidden;
            box-sizing: border-box;
        }

        .header {
            padding: 60px;
            z-index: 10;
        }

        .winc-logo {
            font-weight: 900;
            letter-spacing: -2px;
            font-size: 32px;
            color: #10b981;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
        }

        .title {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            color: #1e293b;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 24px;
            font-weight: 400;
            color: #64748b;
            max-width: 80%;
        }

        .footer {
            margin-top: auto;
            padding: 60px;
            background-color: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        .stats {
            color: #1e293b;
            font-size: 14px;
            line-height: 2;
        }

        .version-badge {
            background-color: #10b981;
            color: white;
            padding: 8px 16px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 4px;
        }

        /* Decorative Watermark */
        .watermark {
            position: absolute;
            bottom: -50px;
            right: -50px;
            opacity: 0.05;
            width: 80%;
            pointer-events: none;
        }

        @media print {
            body { background: none; }
            .cover-page { 
                box-shadow: none; 
                border-top: 15mm solid #10b981; 
            }
        }
    </style>
</head>
<body>
    <div class="cover-page">
        <div class="header">
            <div class="winc-logo">
                <span style="font-size: 46px; margin-right: 15px;">🐢</span> WINC CLINICAL
            </div>
            <div class="title">Clinical Incubator Operating System (CIOS)</div>
            <div class="subtitle">Reference Manual for Precision Chelonian Conservation and Longitudinal Biological Tracking.</div>
        </div>

        <div class="footer">
            <div class="stats">
                <b>WISCONSIN TURTLE PROGRAM</b><br>
                Wildlife In Need Center © 2026<br>
                <i>Clinical Sovereignty Edition</i>
            </div>
            <div class="version-badge">VERSION 9.0.2</div>
        </div>

        <!-- This watermark will be replaced by the schematic if path resolution allows in browser -->
        <img class="watermark" src="../../assets/manual/turtle_egg_stages_schematic_1775942373550.png" onerror="this.style.display='none'">
    </div>
</body>
</html>
