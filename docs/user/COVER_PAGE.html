<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINC Manual Cover Poster</title>
    <style>
        /* Non-blocking font loading — replaces @import to prevent render delay */
        /* Bug-PERF-001: @import blocks rendering for 60-120s in restricted networks */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c3e50;
        }

        .poster {
            width: 8.5in;
            height: 11in;
            background-image: url('../../assets/manual/cover.png');
            background-size: cover;
            background-position: center;
            position: relative;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0.8in;
            box-sizing: border-box;
            overflow: hidden;
            border: 15px solid #ffffff;
        }

        /* Fun Cartoon Overlay Style */
        .title-group {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 30px;
            border: 6px solid #27ae60;
            box-shadow: 0 15px 0 rgba(39, 174, 96, 0.3);
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            font-size: 48pt;
            margin: 0;
            color: #27ae60;
            -webkit-text-stroke: 2px white;
            text-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
            line-height: 1.1;
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 20pt;
            font-weight: 800;
            color: #2c3e50;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer-group {
            text-align: center;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 25px;
            border-radius: 20px;
            border: 5px solid #27ae60;
        }

        .credits {
            font-family: 'Luckiest Guy', cursive;
            font-size: 24pt;
            color: #2ecc71;
            letter-spacing: 1px;
        }

        .details {
            font-family: 'Outfit', sans-serif;
            font-size: 12pt;
            margin-top: 10px;
            color: #bdc3c7;
            font-weight: 400;
        }

        /* Decorative Badge */
        .badge {
            position: absolute;
            top: -20px;
            right: 40px;
            background: #f1c40f;
            color: #2c3e50;
            padding: 40px 15px 15px 15px;
            font-weight: 800;
            font-size: 12pt;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 85%, 0% 100%);
            border: 3px solid #000;
        }

        /* WINC Logo — top-left of poster, superimposed over background */
        .winc-logo {
            position: absolute;
            top: 0.5in;
            left: 0.5in;
            width: 180px;
            opacity: 0.95;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.4));
            z-index: 10;
        }

        @media print {
            body {
                background: none;
            }

            .poster {
                box-shadow: none;
                border: 15px solid #ffffff !important;
            }
        }
    </style>
</head>

<body>

    <div class="poster">
        <!-- WINC Logo: superimposed top-left — added CR-20260423 -->
        <img class="winc-logo" src="../../assets/winc-logo2.jpg" alt="Wildlife In Need Center" />
        <div class="badge">V10.5.1</div>

        <div class="title-group">
            <h1>WINC</h1>
            <div class="subtitle">Turtle Egg Incubation<br>& Hatching System</div>
        </div>

        <div class="footer-group">
            <div class="credits">Developed by Kevin Howland</div>
            <div class="details">
                it2howland@gmail.com | Released: April 2026<br>
                <b>OFFICIAL OPERATOR'S MANUAL</b>
            </div>
        </div>
    </div>

</body>

</html>
