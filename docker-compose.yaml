services:
  agent-zero:
    image: agent0ai/agent-zero:latest
    container_name: TurtleDB_Development_Agent
    volumes:
      - .:/workspace
      - ./expert.md:/a0/expert.md
    ports:
      - 50081:80
    environment:
      - WORKSPACE_DIR=/workspace
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL}
      - MODEL=${CHAT_MODEL}
      - A0_SET_CHAT_MODEL_PROVIDER=google
      - A0_SET_CHAT_MODEL_NAME=gemini-3-flash-preview
      - A0_SET_UTIL_MODEL_PROVIDER=google
      - A0_SET_UTIL_MODEL_NAME=gemini-3-flash-preview
      - A0_SET_BROWSER_MODEL_PROVIDER=google
      - A0_SET_BROWSER_MODEL_NAME=gemini-3-flash-preview
      - MAX_TOKENS=${MAX_TOKENS}
      - LITELLM_LOGGING=DEBUG
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - mcp-supabase
    stdin_open: true
    tty: true
    restart: always

  mcp-supabase:
    image: node:18-slim
    container_name: IncubatorVault_MCP
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    command: >
      sh -c "npx -y @supabase/mcp-server-supabase@latest --access-token ${SUPABASE_MANAGEMENT_API_TOKEN}"
    stdin_open: true
    tty: true
    restart: always
